kind = "web"
previewPath = "/"
title = "LocalStore"
version = "1.0.0"
id = "artifacts/localstore"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25596

[services.development]
run = "pnpm --filter @workspace/localstore run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/localstore", "run", "build" ]
publicDir = "artifacts/localstore/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25596"
BASE_PATH = "/"
